name: Deploy Cloud Run

on:
  workflow_dispatch:
    inputs:
      gcp_project:
        description: ID do projeto GCP
        required: true
      gcp_region:
        description: Região Cloud Run
        default: us-central1
      service_name:
        description: Nome do serviço
        default: advocacia-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build and push
        run: |
          gcloud builds submit \
            --tag "gcr.io/${{ inputs.gcp_project }}/${{ inputs.service_name }}:${{ github.sha }}"

      - name: Deploy Cloud Run
        run: |
          gcloud run deploy "${{ inputs.service_name }}" \
            --image "gcr.io/${{ inputs.gcp_project }}/${{ inputs.service_name }}:${{ github.sha }}" \
            --region "${{ inputs.gcp_region }}" \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "AI_BACKEND=vertex,GOOGLE_CLOUD_PROJECT=${{ inputs.gcp_project }},VERTEX_LOCATION=${{ inputs.gcp_region }},RATE_LIMIT_ENABLED=true"
