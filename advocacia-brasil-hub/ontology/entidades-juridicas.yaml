version: "1.0"
entidades:
  - id: processo_cnj
    padroes_regex:
      - '\b\d{7}-\d{2}\.\d{4}\.\d\.\d{2}\.\d{4}\b'
    normalizacao: manter_mascara_cnj
  - id: cpf
    padroes_regex:
      - '\b\d{3}\.\d{3}\.\d{3}-\d{2}\b'
      - '\b\d{11}\b'
  - id: cnpj
    padroes_regex:
      - '\b\d{2}\.\d{3}\.\d{3}/\d{4}-\d{2}\b'
  - id: oab
    padroes_regex:
      - '\bOAB[/\s]?[A-Z]{2}\s?\d+\b'
  - id: valor_monetario
    padroes_regex:
      - 'R\$\s?[\d.,]+'
  - id: data
    padroes_regex:
      - '\b\d{1,2}/\d{1,2}/\d{4}\b'
  - id: vara
    descricao: Vara / juízo — extração por NLP complementar
  - id: comarca
    descricao: Comarca — extração por NLP complementar

conceitos_prioritarios:
  - danos_morais
  - tutela_urgencia
  - rescisao_contratual
  - justica_gratuita
  - prescricao
  - decadencia
